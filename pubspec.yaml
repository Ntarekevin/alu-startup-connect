name: alu_startup_connect
description: ALU Startup Connect - Bridging African Leadership University students with startup opportunities.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  google_sign_in: ^6.2.1
  file_picker: ^11.0.2
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
